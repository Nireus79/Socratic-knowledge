name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Git for line endings
      run: |
        git config --global core.autocrlf false
        git config --global core.safecrlf false

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev]"

    - name: Check formatting with Black
      run: |
        black --check src/socratic_knowledge/ tests/ examples/

    - name: Lint with Ruff
      run: |
        ruff check src/socratic_knowledge/ tests/ examples/

    - name: Type check with MyPy
      run: |
        mypy src/socratic_knowledge/ --ignore-missing-imports --no-error-summary || true
